<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Automation Platform - {{ title or "Dashboard" }}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      .sidebar {
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .nav-link {
        color: rgba(255, 255, 255, 0.8);
        transition: all 0.3s;
      }

      .nav-link:hover {
        color: white;
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 5px;
      }

      .nav-link.active {
        color: white;
        background-color: rgba(255, 255, 255, 0.2);
        border-radius: 5px;
      }

      .card {
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        border: none;
      }

      .status-badge {
        font-size: 0.8em;
      }

      .metric-card {
        background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
        color: white;
      }

      .metric-card.success {
        background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
      }

      .metric-card.warning {
        background: linear-gradient(45deg, #43e97b 0%, #38f9d7 100%);
      }

      .metric-card.danger {
        background: linear-gradient(45deg, #fa709a 0%, #fee140 100%);
      }

      .log-container {
        background-color: #f8f9fa;
        border-radius: 8px;
        max-height: 300px;
        overflow-y: auto;
      }

      .processing-animation {
        display: none;
      }

      .processing-animation.active {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
          <div class="position-sticky pt-3">
            <div class="text-center mb-4">
              <i class="fas fa-envelope-open-text fa-2x mb-2"></i>
              <h5>Email Automation</h5>
            </div>

            <ul class="nav flex-column">
              <li class="nav-item">
                <a
                  class="nav-link {% if current_page == 'dashboard' %}active{% endif %}"
                  href="/"
                >
                  <i class="fas fa-tachometer-alt me-2"></i>
                  Dashboard
                </a>
              </li>
              <li class="nav-item">
                <a
                  class="nav-link {% if current_page == 'settings' %}active{% endif %}"
                  href="/settings"
                >
                  <i class="fas fa-cog me-2"></i>
                  Settings
                </a>
              </li>
              <li class="nav-item">
                <a
                  class="nav-link {% if current_page == 'files' %}active{% endif %}"
                  href="/files"
                >
                  <i class="fas fa-folder-open me-2"></i>
                  Files
                </a>
              </li>
              <li class="nav-item">
                <a
                  class="nav-link {% if current_page == 'logs' %}active{% endif %}"
                  href="/logs"
                >
                  <i class="fas fa-list-alt me-2"></i>
                  Logs
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/api/v1/docs" target="_blank">
                  <i class="fas fa-code me-2"></i>
                  API Docs
                </a>
              </li>
            </ul>
          </div>
        </nav>

        <!-- Main content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
          <div
            class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom"
          >
            <h1 class="h2">{{ title or "Dashboard" }}</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
              <div class="btn-group me-2">
                <button
                  type="button"
                  class="btn btn-sm btn-outline-secondary"
                  onclick="refreshPage()"
                >
                  <i class="fas fa-sync-alt"></i> Refresh
                </button>
              </div>
            </div>
          </div>

          <!-- Content Block -->
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function refreshPage() {
        location.reload();
      }

      // Refresh summary metrics every 30 seconds
      setInterval(function () {
        if (document.hidden === false) {
          updateMetrics();
        }
      }, 30000);

      function updateMetrics() {
        // Use the same stats source as dashboard server-side render.
        fetch("/api/web/stats")
          .then((response) => response.json())
          .then((data) => {
            // Update matching metric elements on the page
            const elements = document.querySelectorAll("[data-metric]");
            elements.forEach((el) => {
              const metric = el.getAttribute("data-metric");
              if (data[metric] !== undefined) {
                el.textContent = data[metric];
              }
            });
          })
          .catch((err) => console.error("Failed to refresh metrics:", err));
      }

      // Trigger email processing via API
      function processEmails(force = false, dryRun = false) {
        const button = document.getElementById("processBtn");
        const spinner = button.querySelector(".processing-animation");

        button.disabled = true;
        spinner.classList.add("active");

        fetch("/api/v1/emails/process", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            force_reprocess: force,
            dry_run: dryRun,
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            alert("Processing result: " + data.message);
            setTimeout(() => {
              location.reload();
            }, 2000);
          })
          .catch((err) => {
            alert("Error: " + err.message);
          })
          .finally(() => {
            button.disabled = false;
            spinner.classList.remove("active");
          });
      }
    </script>

    {% block scripts %}{% endblock %}
  </body>
</html>
