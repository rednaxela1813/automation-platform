

services:
  # Основное приложение
  automation-platform:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: automation-platform
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      - database
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # База данных для хранения состояний
  database:
    image: postgres:15-alpine
    container_name: automation-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: automation
      POSTGRES_USER: automation
      POSTGRES_PASSWORD: ${DB_PASSWORD:-automation_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"

  # Redis для кеширования и очередей
  redis:
    image: redis:7-alpine
    container_name: automation-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Планировщик задач (Celery)
  celery-worker:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: automation-celery
    restart: unless-stopped
    command: celery -A automation.celery worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      - database
      - redis

  # Celery Beat для периодических задач  
  celery-beat:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: automation-beat
    restart: unless-stopped
    command: celery -A automation.celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - database
      - redis

  # Nginx для reverse proxy и статических файлов
  nginx:
    image: nginx:alpine
    container_name: automation-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - automation-platform

volumes:
  postgres_data:
  redis_data: